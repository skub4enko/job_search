name: Build & Release (Windows EXE)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build EXE (PyInstaller)
        shell: pwsh
        run: |
          python .\compile_to_exe.py --onefile

      - name: Package release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Force .\dist\JobSearchUA.exe .\release\JobSearchUA.exe
          $hash = (Get-FileHash .\release\JobSearchUA.exe -Algorithm SHA256).Hash
          "$hash  JobSearchUA.exe" | Out-File -FilePath .\release\JobSearchUA.exe.sha256.txt -Encoding ascii
          Compress-Archive -Force -Path .\release\JobSearchUA.exe,.\release\JobSearchUA.exe.sha256.txt -DestinationPath .\release\JobSearchUA_${{ github.ref_name }}_win64.zip

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/JobSearchUA_${{ github.ref_name }}_win64.zip
            release/JobSearchUA.exe.sha256.txt
